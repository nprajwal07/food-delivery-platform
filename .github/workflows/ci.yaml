name: Food Delivery CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code 
        uses: actions/checkout@v4
      - name: build backend
        run : docker build -t food-delivery-backend:latest ./backend
      - name: build frontend
        run : docker build -t food-delivery-frontend:latest ./frontend
      - name: build admin
        run : docker build -t food-delivery-admin:latest ./admin
      - name: Final message
        run: echo "Build completed successfully!"
   
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build 
    steps: 
      - name: checkout code
        uses: actions/checkout@v4
      - name: publish docker images
        run: echo "Publishing Docker images to Docker Hub..."
