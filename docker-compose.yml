version: "3.8"
services:
  backend:
    build:
      context: ./backend
    image: food-delivery-backend:v1
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    image: food-delivery-frontend:v1
    ports:
      - "5173:5173"
    depends_on:
      - backend
    
  admin:
    build:
      context: ./admin
    image: food-delivery-admin:v1
    ports:
      - "5174:5173"
    depends_on:
      - backend
    
  